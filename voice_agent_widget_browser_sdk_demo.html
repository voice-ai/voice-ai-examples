<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice AI Widget Browser Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      min-height: 100vh;
      color: rgba(255, 255, 255, 0.9);
      overflow: hidden;
      position: relative;
      background:
        url('https://images.unsplash.com/photo-1507608616759-54f48f0af0ee?w=1920&q=80') center/cover no-repeat fixed;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      margin: 48px;
      padding: 32px 40px;
      max-width: 500px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 8px;
    }

    p {
      font-size: 14px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 20px;
    }

    .state-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .state-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
    }

    .state-shape {
      width: 32px;
      height: 32px;
      background: rgba(10, 15, 25, 0.8);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(45, 212, 191, 0.5);
      box-shadow:
        0 0 16px rgba(45, 212, 191, 0.25),
        0 4px 12px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .state-shape-circle {
      border-radius: 50%;
    }

    .state-shape-square {
      border-radius: 10px;
    }

    :root {
      --widget-accent: rgba(45, 212, 191, 1);
      --widget-accent-glow: rgba(45, 212, 191, 0.35);
      --widget-glass-bg: rgba(10, 15, 25, 0.8);
      --widget-glass-border: rgba(255, 255, 255, 0.15);
    }

    .voice-agent-widget {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      z-index: 9999;
      position: relative;
    }

    .voice-agent-widget-end-button {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(220, 60, 60, 0.9);
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      transition: all 0.2s ease;
      z-index: 10;
    }

    .voice-agent-widget-end-button:hover {
      background: rgba(220, 60, 60, 1);
      transform: scale(1.1);
    }

    .voice-agent-widget-bottom-right { position: fixed; bottom: 28px; right: 28px; }
    .voice-agent-widget-bottom-left { position: fixed; bottom: 28px; left: 28px; }
    .voice-agent-widget-top-right { position: fixed; top: 28px; right: 28px; }
    .voice-agent-widget-top-left { position: fixed; top: 28px; left: 28px; }

    .voice-agent-widget-trigger {
      position: relative;
      width: 64px;
      height: 64px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      outline: none;
    }

    .voice-agent-widget-button-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .voice-agent-widget-glow {
      position: absolute;
      inset: -14px;
      border-radius: 50%;
      background: radial-gradient(circle at center, var(--widget-accent) 0%, var(--widget-accent-glow) 40%, transparent 70%);
      filter: blur(14px);
      opacity: 0.25;
      transition: opacity 0.3s ease, border-radius 0.5s ease, transform 0.3s ease;
    }

    .voice-agent-widget-button {
      position: relative;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--widget-glass-bg);
      backdrop-filter: blur(24px) saturate(120%);
      -webkit-backdrop-filter: blur(24px) saturate(120%);
      border: 1px solid var(--widget-glass-border);
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.25),
        0 1px 2px rgba(0, 0, 0, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      overflow: hidden;
      transition: border-radius 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .voice-agent-widget-trigger:hover .voice-agent-widget-button {
      border-color: var(--widget-accent);
      transform: scale(1.12);
      box-shadow:
        0 12px 40px rgba(0, 0, 0, 0.4),
        0 0 20px var(--widget-accent-glow),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .voice-agent-widget-trigger:hover .voice-agent-widget-glow {
      opacity: 0.6;
      transform: scale(1.2);
    }

    .voice-agent-widget-trigger:active .voice-agent-widget-button {
      transform: scale(1.05);
    }

    .voice-agent-widget-inner-glow {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, transparent 40%);
      pointer-events: none;
    }

    .voice-agent-widget-bars {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 4px;
      align-items: center;
      justify-content: center;
      z-index: 10;
      height: 24px;
      overflow: hidden;
    }

    .voice-agent-widget-bar {
      width: 3px;
      min-height: 4px;
      max-height: 20px;
      height: 6px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.6);
      transition: height 0.05s ease-out;
    }

    .voice-agent-widget-state-disconnected .voice-agent-widget-button {
      background: rgba(20, 25, 35, 0.7);
      border-color: rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .voice-agent-widget-state-disconnected .voice-agent-widget-glow {
      opacity: 0.1;
    }

    .voice-agent-widget-state-disconnected .voice-agent-widget-bar {
      background: rgba(255, 255, 255, 0.35);
    }

    .voice-agent-widget-state-connecting .voice-agent-widget-button {
      border-radius: 50%;
      background: var(--widget-glass-bg);
      border-color: var(--widget-accent);
      animation: connecting-pulse 1.4s ease-in-out infinite;
    }

    .voice-agent-widget-state-connecting .voice-agent-widget-glow {
      border-radius: 50%;
      opacity: 0.5;
      animation: connecting-glow 1.4s ease-in-out infinite;
    }

    @keyframes connecting-pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25), 0 0 12px var(--widget-accent-glow), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }
      50% {
        transform: scale(1.08);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 28px var(--widget-accent-glow), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }
    }

    @keyframes connecting-glow {
      0%, 100% {
        opacity: 0.35;
        transform: scale(1);
      }
      50% {
        opacity: 0.7;
        transform: scale(1.15);
      }
    }

    .voice-agent-widget-state-connecting .voice-agent-widget-bar {
      background: var(--widget-accent);
    }

    .voice-agent-widget-state-listening .voice-agent-widget-button {
      border-radius: 50%;
      background: var(--widget-glass-bg);
      border-color: rgba(45, 212, 191, 0.5);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25), 0 0 16px var(--widget-accent-glow), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .voice-agent-widget-state-listening .voice-agent-widget-glow {
      border-radius: 50%;
      opacity: 0.45;
    }

    .voice-agent-widget-state-listening .voice-agent-widget-bar {
      background: rgba(255, 255, 255, 0.7);
    }

    .voice-agent-widget-state-speaking .voice-agent-widget-button {
      border-radius: 16px;
      background: var(--widget-glass-bg);
      border-color: var(--widget-accent);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25), 0 0 24px var(--widget-accent-glow), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .voice-agent-widget-state-speaking .voice-agent-widget-glow {
      border-radius: 22px;
      opacity: 0.6;
    }

    .voice-agent-widget-state-speaking .voice-agent-widget-bar {
      background: #fff;
    }

    .voice-agent-widget-panel {
      position: absolute;
      bottom: 80px;
      right: 0;
      width: 320px;
      height: 0;
      opacity: 0;
      overflow: hidden;
      background: rgba(8, 12, 20, 0.92);
      backdrop-filter: blur(40px) saturate(150%);
      -webkit-backdrop-filter: blur(40px) saturate(150%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 10px 30px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform: translateY(20px) scale(0.95);
      transform-origin: bottom right;
    }

    .voice-agent-widget-panel.open {
      height: 400px;
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .voice-agent-widget-bottom-left .voice-agent-widget-panel {
      right: auto;
      left: 0;
      transform-origin: bottom left;
    }

    .voice-agent-widget-top-right .voice-agent-widget-panel {
      bottom: auto;
      top: 80px;
      transform-origin: top right;
    }

    .voice-agent-widget-top-left .voice-agent-widget-panel {
      bottom: auto;
      top: 80px;
      right: auto;
      left: 0;
      transform-origin: top left;
    }

    .voice-agent-widget-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 8%, black 100%);
    }

    .voice-agent-widget-messages::-webkit-scrollbar {
      width: 4px;
    }

    .voice-agent-widget-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .voice-agent-widget-messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
    }

    .voice-agent-widget-message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.5;
      word-wrap: break-word;
      animation: message-appear 0.3s ease-out;
    }

    @keyframes message-appear {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .voice-agent-widget-message-assistant {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.9);
      border-bottom-left-radius: 6px;
    }

    .voice-agent-widget-message-user {
      align-self: flex-end;
      background: rgba(45, 212, 191, 0.15);
      border: 1px solid rgba(45, 212, 191, 0.2);
      color: rgba(255, 255, 255, 0.95);
      border-bottom-right-radius: 6px;
    }

    .voice-agent-widget-input-area {
      display: flex;
      gap: 8px;
      padding: 12px 16px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(0, 0, 0, 0.2);
      border-radius: 0 0 24px 24px;
    }

    .voice-agent-widget-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.95);
      outline: none;
      transition: all 0.2s ease;
    }

    .voice-agent-widget-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .voice-agent-widget-input:focus {
      border-color: var(--widget-accent);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 12px rgba(45, 212, 191, 0.15);
    }

    .voice-agent-widget-send-button {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: none;
      background: var(--widget-accent);
      color: rgba(0, 0, 0, 0.8);
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .voice-agent-widget-send-button:hover {
      background: rgba(45, 212, 191, 1);
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(45, 212, 191, 0.3);
    }

    .voice-agent-widget-send-button:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>Voice AI Widget</h1>
    <p>Click the widget in the bottom-right corner to connect. The widget shape changes based on agent state.</p>

    <div class="state-legend">
      <div class="state-item">
        <div class="state-shape state-shape-circle"></div>
        <span>Listening</span>
      </div>
      <div class="state-item">
        <div class="state-shape state-shape-square"></div>
        <span>Speaking</span>
      </div>
    </div>
  </div>

  <script type="module">
    import VoiceAI, { VoiceAgentWidget } from 'https://cdn.jsdelivr.net/npm/@voice-ai-labs/web-sdk@1.0.0/dist/index.esm.js';

    try {
      const connectionOptions = {
        apiKey: 'PUT_YOUR_API_KEY_HERE',
        agentId: 'PUT_YOUR_AGENT_ID_HERE',
      };

      const voiceai = new VoiceAI({
        apiKey: connectionOptions.apiKey,
      });

      new VoiceAgentWidget({
        sdk: voiceai,
        connectionOptions,
        position: 'bottom-right',
      });

      console.log('Widget initialized');
    } catch (error) {
      console.error('Error:', error);
    }
  </script>
</body>
</html>
